version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: frontdesk-ai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: frontdesk
      POSTGRES_PASSWORD: frontdesk_local_dev
      POSTGRES_DB: frontdesk_ai
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frontdesk -d frontdesk_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
